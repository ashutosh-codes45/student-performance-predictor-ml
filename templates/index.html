<!DOCTYPE html>
<html>
<head>
    <title>Student Performance Predictor</title>

    <!-- Simple styling (Bootstrap CDN) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <h2 class="text-center mb-4">📊 Student Performance Predictor</h2>

    <!-- FORM -->
    <form method="POST" action="/predict" enctype="multipart/form-data" class="card p-4 shadow">

        <!-- Study Hours -->
        <div class="mb-3">
            <label class="form-label">Study Hours</label>
            <input type="number" step="0.1" name="study_hours" class="form-control" required>
        </div>

        <!-- Attendance -->
        <div class="mb-3">
            <label class="form-label">Attendance (%)</label>
            <input type="number" step="0.1" name="attendance" class="form-control" required>
        </div>

        <!-- Internet-Usage -->
        <div class="mb-3">
            <label class="form-label">Internet Usage</label>
            <input type="number" step="0.1" name="internetUsage" class="form-control" required>
        </div>

        <!-- Submit -->
        <button type="submit" class="btn btn-primary w-100">Predict</button>
    </form>

    <!-- EXPECTED MARKS & RESULT -->
    {% if result %}
        <div class="alert 
        mt-4 text-center
        {% if result == 'Pass!' %} alert-success
         {% else %} alert-danger
         {% endif %}">
            <h4>Predicted RESULT: {{ result }}</h4>
        </div>
    {% endif %}

    {% if marks %}
        <div class="alert alert-success mt-4 text-center">
            <h4>Predicted MARKS: {{ marks }}</h4>
        </div>
    {% endif %}

    <!-- ERROR -->
    {% if error %}
        <div class="alert alert-danger mt-4 text-center">
            {{ error }}
        </div>
    {% endif %}

    <br> <br>

    {% if marks %}
    <div class="data_visualization"></div>
    <h2 style="text-align: center;"> Data Insights </h2>
<div class="plots" style="text-align: center;">
    <img src="{{ url_for('static', filename='plots/marks_distribution.png')}}" style="text-align: center;" width="65%">
    <br>
    <img src="{{ url_for('static', filename='plots/study_vs_marks.png')}}" style="text-align: center;" width="65%">
    <br>
    <img src="{{ url_for('static', filename='plots/internet_vs_marks.png')}}" width="65%">
</div>
</div>
{% endif %}

</body>
</html>
